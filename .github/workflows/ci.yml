name: CI

# Build + test only — no deploy. Runs on every branch push and PR so failures
# are caught before reaching main (the deploy workflow is main-only). main is
# excluded here because "Build and Deploy" already builds + tests it.
on:
  push:
    branches-ignore: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build + test (JVM)
        run: ./mvnw --batch-mode verify
