name: Build and Deploy

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 057133611121.dkr.ecr.eu-west-2.amazonaws.com
  ECR_REPOSITORY: mediawiki-mcp
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Build package
        run: ./mvnw package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -f src/main/docker/Dockerfile.jvm -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ec2-user@${{ secrets.EC2_HOST }} \
            "aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin 057133611121.dkr.ecr.eu-west-2.amazonaws.com
            docker pull 057133611121.dkr.ecr.eu-west-2.amazonaws.com/mediawiki-mcp:latest
            docker stop mediawiki-mcp || true
            docker rm mediawiki-mcp || true
            docker run -d \
              --name mediawiki-mcp \
              --restart unless-stopped \
              -p 8081:8081 \
              -e MEDIAWIKI_BOT_USER='${{ secrets.MEDIAWIKI_BOT_USER }}' \
              -e MEDIAWIKI_BOT_PASSWORD='${{ secrets.MEDIAWIKI_BOT_PASSWORD }}' \
              057133611121.dkr.ecr.eu-west-2.amazonaws.com/mediawiki-mcp:latest"
          rm -f /tmp/deploy_key
