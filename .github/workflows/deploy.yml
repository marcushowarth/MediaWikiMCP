name: Build and Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/marcushowarth/mediawiki-mcp
  IMAGE_TAG: ${{ github.sha }}
  HOST_PORT: "8081"          # Caddy proxies mcp.howarth.eu/mediawiki/* -> 127.0.0.1:8081

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Resolve Mandrel builder image digest
        id: mandrel
        run: |
          DIGEST=$(docker manifest inspect quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25 | sha256sum | cut -d' ' -f1)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Cache Mandrel builder image
        id: cache-mandrel
        uses: actions/cache@v6
        with:
          path: /tmp/mandrel-image.tar
          key: mandrel-builder-jdk25-${{ steps.mandrel.outputs.digest }}

      - name: Load cached Mandrel builder image
        if: steps.cache-mandrel.outputs.cache-hit == 'true'
        run: docker load -i /tmp/mandrel-image.tar

      - name: Pull and cache Mandrel builder image
        if: steps.cache-mandrel.outputs.cache-hit != 'true'
        run: |
          docker pull quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25
          docker save quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25 -o /tmp/mandrel-image.tar

      - name: Build native image + run native integration test
        run: >
          ./mvnw --batch-mode verify -Dnative
          -Dquarkus.native.container-build=true
          -Dquarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -f src/main/docker/Dockerfile.native \
            -t $IMAGE:$IMAGE_TAG .
          docker tag $IMAGE:$IMAGE_TAG $IMAGE:latest
          docker push $IMAGE:$IMAGE_TAG
          docker push $IMAGE:latest

      - name: Deploy to Hetzner
        run: |
          echo "${{ secrets.HETZNER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            deploy@${{ secrets.HETZNER_HOST }} \
            "echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE }}:latest
            docker stop mediawiki-mcp || true
            docker rm mediawiki-mcp || true
            docker run -d \
              --name mediawiki-mcp \
              --restart unless-stopped \
              -p 127.0.0.1:${{ env.HOST_PORT }}:8081 \
              -e MEDIAWIKI_BOT_USER='${{ secrets.MEDIAWIKI_BOT_USER }}' \
              -e MEDIAWIKI_BOT_PASSWORD='${{ secrets.MEDIAWIKI_BOT_PASSWORD }}' \
              ${{ env.IMAGE }}:latest
            docker image prune -f"
          rm -f /tmp/deploy_key

      - name: Health-check the freshly deployed container
        run: |
          echo "${{ secrets.HETZNER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          for i in $(seq 1 12); do
            if ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.HETZNER_HOST }} \
                "curl -sf -m 5 http://localhost:${{ env.HOST_PORT }}/health"; then
              echo "Healthy after $i attempt(s)."
              rm -f /tmp/deploy_key
              exit 0
            fi
            echo "Not up yet (attempt $i), retrying..."
            sleep 5
          done
          echo "Container never became healthy"
          rm -f /tmp/deploy_key
          exit 1
